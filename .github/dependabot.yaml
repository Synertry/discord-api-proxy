# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: daily
      time: '19:00'
      timezone: Europe/Berlin
    # Raise pull requests for version updates
    # to bun against the `main` branch
    target-branch: 'main'
    # Disable rebasing pull requests
    rebase-strategy: 'auto'
    # Allow up to 10 open pull requests
    open-pull-requests-limit: 10
    # Cooldown to let releases bake before we pull them in (mitigates supply-chain
    # incidents like the March 2026 axios compromise, axios/axios#10604, where a
    # freshly-published version carried malicious code).
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    # Labels on pull requests for version updates only
    labels:
      - 'workflow/dependabot'
      - 'workflow/auto-pr'
      - 'area/deps'
    assignees:
      - Synertry
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '19:00'
      timezone: Europe/Berlin
    target-branch: 'main'
    rebase-strategy: 'auto'
    open-pull-requests-limit: 10
    # github-actions ecosystem only accepts default-days (the semver-*-days
    # keys are rejected by Dependabot's parser because action tags aren't
    # strict semver).
    cooldown:
      default-days: 5
    labels:
      - 'workflow/dependabot'
      - 'workflow/auto-pr'
      - 'area/CI'
    assignees:
      - Synertry
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
