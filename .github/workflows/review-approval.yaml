# Commits the PR to production without creating a new commit hash
name: Auto Fast-Forward Approval

on:
  pull_request_review:
    types:
        - submitted
  pull_request:
    types:
        - labeled
  issue_comment:
    types:
        - created
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: string
        description: 'Target Pull Request Number (e.g., 42)'

jobs:
  merge:
    name: Execute Fast-Forward Push
    runs-on: ubuntu-latest
    # Without this job-level gate, every comment in the repo would trigger a
    # runner. Pass through other event types and let step-level `if:`s decide.
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/approve'))
    permissions:
      contents: write
      pull-requests: write
    outputs:
      target_sha: ${{ steps.validate.outputs.validated_sha }}
    steps:
      - name: Extract Review Event Data
        id: review_data
        if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
        run: |
          echo "TARGET_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "BASE_REF=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"

      - name: Extract Label Event Data
        id: label_data
        if: github.event_name == 'pull_request' && github.event.label.name == 'status/approved'
        run: |
          echo "TARGET_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "BASE_REF=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"

      - name: Verify Comment Author Permission
        id: verify_commenter
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          # Gate the command on the commenter's repo role. Triage is insufficient,
          # only write/maintain/admin can trigger the fast-forward. Errors (e.g.
          # commenter is not a collaborator at all) fall back to "none" so the gate
          # fails closed.
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/$COMMENT_USER/permission" --jq '.permission' 2>/dev/null || echo "none")
          echo "Commenter '$COMMENT_USER' has permission '$PERMISSION'."
          case "$PERMISSION" in
            admin|maintain|write) echo "authorized=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "Insufficient permission. Halting." ;;
          esac

      - name: Extract Comment Command Data
        id: comment_data
        if: github.event_name == 'issue_comment' && steps.verify_commenter.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefOid,baseRefName,headRefName)
          echo "TARGET_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName')" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"

      - name: Extract Manual Dispatch Data
        id: dispatch_data
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ inputs.pr_number }}"
          # Fetch PR metadata via GitHub CLI and extract JSON values
          PR_JSON=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefOid,baseRefName,headRefName)
          echo "TARGET_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName')" >> "$GITHUB_OUTPUT"
          echo "HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"

      - name: Validate Branch Constraints
        id: validate
        env:
          # Coalesce outputs: only the step that executed will return a value
          TARGET_SHA: ${{ steps.review_data.outputs.TARGET_SHA || steps.label_data.outputs.TARGET_SHA || steps.comment_data.outputs.TARGET_SHA || steps.dispatch_data.outputs.TARGET_SHA }}
          BASE_REF: ${{ steps.review_data.outputs.BASE_REF || steps.label_data.outputs.BASE_REF || steps.comment_data.outputs.BASE_REF || steps.dispatch_data.outputs.BASE_REF }}
          HEAD_REF: ${{ steps.review_data.outputs.HEAD_REF || steps.label_data.outputs.HEAD_REF || steps.comment_data.outputs.HEAD_REF || steps.dispatch_data.outputs.HEAD_REF }}
        run: |
          if [ -z "$TARGET_SHA" ]; then
            echo "Trigger condition not met. Halting execution."
            exit 0
          fi

          if [ "$BASE_REF" != "production" ] || [ "$HEAD_REF" != "main" ]; then
            echo "Invalid routing: $HEAD_REF -> $BASE_REF. Must be main -> production. Halting."
            exit 0
          fi

          echo "validated_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.validate.outputs.validated_sha != ''
        uses: actions/checkout@v6.0.3
        with:
          # A full clone is required to ensure the local runner has the correct references to push
          fetch-depth: 0
          token: ${{ secrets.PAT }}  # PAT required, GITHUB_TOKEN pushes don't trigger workflows

      - name: Fast-forward production branch
        if: steps.validate.outputs.validated_sha != ''
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          # Push the exact commit SHA of the approved PR head directly to the production reference
          git push origin ${{ steps.validate.outputs.validated_sha }}:refs/heads/production
