name: PR Labeler

on:
  pull_request:
    branches:
      - production
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    name: Triage PR
    if: ${{ github.actor != 'dependabot[bot]' }} # Dependabot handles it's own labels in ../dependabot.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v7.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labels.yaml
          sync-labels: true

  size-labeler:
    name: Label the PR size
    runs-on: ubuntu-latest
    needs: triage
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.1
      - name: Label PR based on size
        uses: cbrgm/pr-size-labeler-action@v1.3.10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Pass the GitHub token for authentication
          github_repository: ${{ github.repository }} # Pass the repository name
          github_pr_number: ${{ github.event.number }} # Pass the pull request number
          config_file_path: '.github/pull-request-size.yaml' # Specify the path to the configuration file
          github_enterprise_url: '' # Optional: GitHub Enterprise URL (e.g., https://github.mycompany.com)
