# Reusable workflow: post a Discord embed describing the outcome of a deploy.
# Invoked from deploy.yaml's final `notify` job with `needs.deploy.result` so
# both successful and failed deploys produce an observable signal.
#
# Repo-agnostic by design: the embed identity (title, author link) is derived
# from `github.repository`, which inside a `workflow_call` resolves to the
# CALLER's repo. The same file is reused across multiple repositories without
# edits, and each notification states which repo it came from.
#
# "What changed" at a glance: when the caller passes `base_sha` (the previous
# deployed commit), the embed description lists every commit in
# base_sha..sha, newest first, each linked to its PR. That turns a production
# deploy (which fast-forwards many merged PRs) into a readable changelog
# instead of just the single head commit title.
#
# Discord embed character limits (documented at
# https://discord.com/developers/docs/resources/message#embed-object-embed-limits):
#   title          <= 256
#   description    <= 4096
#   field value    <= 1024
#   total embed    <= 6000 (sum of all rendered text)
# We truncate proactively so a malformed upstream input cannot cause Discord
# to reject the webhook payload.
name: Deploy Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: 'Result of the upstream deploy job (success | failure | cancelled | skipped)'
      sha:
        required: true
        type: string
        description: 'Full commit SHA being deployed (changelog head)'
      base_sha:
        required: false
        type: string
        default: ''
        description: 'Previous deployed commit SHA (e.g. github.event.before). When set, the description lists base_sha..sha as a per-PR changelog. Empty or an all-zero SHA falls back to the single head commit.'
      deploy_msg:
        required: false
        type: string
        default: ''
        description: 'Commit title used as the Cloudflare deploy message; the changelog fallback when no base_sha is supplied'
      actor:
        required: true
        type: string
        description: 'GitHub login that triggered the deploy (github.actor)'
      commit_url:
        required: true
        type: string
        description: 'GitHub URL to the deployed commit'
      run_url:
        required: true
        type: string
        description: 'GitHub URL to this workflow run'
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true
        description: 'Discord webhook URL receiving the embed'

# Compare API (repos/{repo}/compare) needs read access to repository contents.
permissions:
  contents: read

jobs:
  discord:
    name: Send Discord Notification
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send Discord Notification
        env:
          STATUS: ${{ inputs.status }}
          SHA: ${{ inputs.sha }}
          BASE_SHA: ${{ inputs.base_sha }}
          DEPLOY_MSG: ${{ inputs.deploy_msg }}
          ACTOR: ${{ inputs.actor }}
          COMMIT_URL: ${{ inputs.commit_url }}
          RUN_URL: ${{ inputs.run_url }}
          # Resolves to the caller's repo (owner/name) and host inside workflow_call.
          REPO_FULL: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          # GITHUB_TOKEN of this reusable workflow; used by `gh api` for the compare call.
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          # Hard-cap a string to a maximum byte length, appending "..." when
          # truncated. Uses bash parameter substitution (UTF-8-safe for ASCII
          # inputs; our inputs are commit messages + GitHub identifiers).
          truncate_str() {
            local str="$1"
            local max="$2"
            if [ "${#str}" -gt "$max" ]; then
              printf '%s...' "${str:0:$((max-3))}"
            else
              printf '%s' "$str"
            fi
          }

          REPO_NAME="${REPO_FULL##*/}"
          REPO_URL="${SERVER_URL}/${REPO_FULL}"

          # Map deploy result -> embed color (Discord RGB int) + title prefix.
          # Repo name is dynamic so the same file serves every repository.
          case "$STATUS" in
            success)
              COLOR=5763719   # green
              TITLE="✅ ${REPO_NAME} deployed"
              ;;
            failure)
              COLOR=15548997  # red
              TITLE="❌ ${REPO_NAME} deploy FAILED"
              ;;
            cancelled)
              COLOR=9807270   # gray
              TITLE="🟡 ${REPO_NAME} deploy cancelled"
              ;;
            *)
              COLOR=10181046  # purple - unexpected upstream result
              TITLE="⚠️ ${REPO_NAME} deploy: $STATUS"
              ;;
          esac

          # --- Build the "what changed" changelog ---------------------------
          # When base_sha is a real commit (not empty, not the all-zero SHA of
          # a branch's first push) and differs from head, ask the compare API
          # for every commit in range and render them newest-first, each line
          # linked to its PR. Any failure here degrades to the single-commit
          # fallback below; the notify must never block on changelog problems.
          CHANGELOG=""
          if [ -n "$BASE_SHA" ] && ! printf '%s' "$BASE_SHA" | grep -qE '^0+$' \
             && [ -n "$SHA" ] && [ "$BASE_SHA" != "$SHA" ]; then
            COMPARE_JSON=$(gh api "repos/${REPO_FULL}/compare/${BASE_SHA}...${SHA}" 2>/dev/null || true)
            if [ -n "$COMPARE_JSON" ]; then
              # For each commit: take the title (first line), strip square
              # brackets so they cannot break the markdown link, and link the
              # title to its PR. The PR number is the LAST "#N" in the title,
              # which is the squash-merge "(#90)" suffix or a merge commit's
              # "#65"; commits with no "#N" link to the commit itself. The
              # "[][]" character class matches "[" and "]" without backslash
              # escaping, keeping the program robust across shell layers.
              CHANGELOG=$(printf '%s' "$COMPARE_JSON" | jq -r --arg repo_url "$REPO_URL" '
                (.commits // [])
                | reverse
                | .[0:20]
                | map(
                    ((.commit.message | split("\n")[0]) | gsub("[][]"; "")) as $title
                    | ([ $title | scan("#([0-9]+)") ] | (.[-1][0] // null)) as $pr
                    | "- " + (
                        if $pr != null
                        then "[\($title)](\($repo_url)/pull/\($pr))"
                        else "[\($title)](\(.html_url))"
                        end
                      )
                  )
                | join("\n")
              ' 2>/dev/null || true)

              TOTAL=$(printf '%s' "$COMPARE_JSON" | jq -r '(.commits // []) | length' 2>/dev/null || echo 0)
              if [ -n "$CHANGELOG" ] && [ "${TOTAL:-0}" -gt 20 ]; then
                CHANGELOG="${CHANGELOG}"$'\n'"_...and $((TOTAL - 20)) more commits_"
              fi
            fi
          fi

          # Description: the changelog when we have one, otherwise a single
          # bulleted line from the head commit so the style stays consistent.
          if [ -n "$CHANGELOG" ]; then
            DESC="$CHANGELOG"
          elif [ -n "$DEPLOY_MSG" ]; then
            DESC="- [${DEPLOY_MSG}](${COMMIT_URL})"
          else
            DESC="(no commit details available)"
          fi

          # Field values. Each is hard-capped to 1024 below. The deployed SHA
          # and Cloudflare version UUID are deliberately omitted: the changelog
          # already links every commit/PR, and a raw version UUID is not
          # actionable from the notification.
          AUTHOR_FIELD="$ACTOR"
          LOGS_FIELD="[View workflow run](${RUN_URL})"

          # Apply Discord's per-element character limits.
          TITLE=$(truncate_str "$TITLE" 256)
          DESC=$(truncate_str "$DESC" 4096)
          AUTHOR_FIELD=$(truncate_str "$AUTHOR_FIELD" 1024)
          LOGS_FIELD=$(truncate_str "$LOGS_FIELD" 1024)

          # Build the JSON payload via jq so quotes, newlines, and unicode are
          # escaped correctly regardless of what came in from the commit titles.
          #
          # `username` constraints (Discord users docs): 2-32 chars, no `@` `#`
          # `:` backtick or `discord` substring, not `everyone` / `here`.
          # We use a generic sender name; the embed author identifies the repo.
          jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg repo_full "$REPO_FULL" \
            --arg repo_url "$REPO_URL" \
            --arg author "$AUTHOR_FIELD" \
            --arg logs "$LOGS_FIELD" \
            '{
              username: "GitHub Actions",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [{
                author: {
                  name: $repo_full,
                  url: $repo_url,
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                title: $title,
                description: $desc,
                url: $url,
                color: $color,
                timestamp: $timestamp,
                fields: [
                  { name: "Triggered by", value: $author, inline: true },
                  { name: "Logs",         value: $logs,   inline: true }
                ],
                footer: {
                  text: "Cloudflare Worker deploy via GitHub Actions"
                }
              }]
            }' > payload.json

          # Fail the notify job if Discord rejects the webhook (4xx/5xx), so
          # observability gaps surface in the Actions UI instead of silently
          # going missing.
          curl --fail-with-body --show-error --silent \
               -H "Content-Type: application/json" \
               -d @payload.json \
               "$DISCORD_WEBHOOK_URL"
